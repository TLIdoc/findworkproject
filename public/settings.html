<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Налаштування | IDOC</title>
    <link rel="stylesheet" href="css.css">
</head>
<body class="page-enter">

    <div class="settings-container">
        <header class="settings-header">
            <button id="btn-back" class="nav-btn">⬅ Назад до вакансій</button>
            <h1 id="settings-title">⚙️ Системні налаштування</h1>
        </header>

        <div class="settings-grid">
            <div class="set-card">
                <h3>🎨 1. Тема оформлення</h3>
                <select id="setting-theme" class="save-trigger">
                    <option value="cyberpunk">Neon Cyberpunk</option>
                    <option value="dark">Dark Void</option>
                </select>
            </div>
            <div class="set-card">
                <h3>✨ 2. Магічні анімації</h3>
                <label class="switch"><input type="checkbox" id="setting-animations" class="save-trigger"><span class="slider"></span></label>
            </div>
            
            <div class="set-card">
                <h3>🌍 3. Мова інтерфейсу</h3>
                <select id="setting-language" class="save-trigger">
                    <option value="uk">Українська</option>
                    <option value="en">English</option>
                </select>
            </div>
            
            <div class="set-card">
                <h3>🌟 4. Яскравість неону</h3>
                <input type="range" min="1" max="100" value="80" id="setting-brightness" class="range-slider save-trigger">
            </div>

            <div class="set-card"><h3>Компактний вигляд</h3><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="set-card"><h3>Шрифт</h3><select><option>Roboto</option><option>Cyber Space</option></select></div>
            <div class="set-card"><h3>🔊 Звукові ефекти</h3><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
            <div class="set-card"><h3>Аватар Стікера</h3><input type="text" placeholder="IDOC" value="IDOC" style="width:100%; padding:5px; background:rgba(0,0,0,0.5); color:#fff; border:1px solid #a605f2;"></div>
            <div class="set-card"><h3>🔄 Автооновлення</h3><select><option>Кожні 5 хв</option><option>Ніколи</option></select></div>
            <div class="set-card"><h3>🔔 Сповіщення</h3><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
            <div class="set-card"><h3>🕵️ Приховати "Без ЗП"</h3><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="set-card"><h3>📡 Економія трафіку</h3><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="set-card"><h3>🗑️ Очистити кеш</h3><button class="nav-btn danger-btn">Очистити пам'ять</button></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
