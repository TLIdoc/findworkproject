<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дошка вакансій</title>
    <link rel="stylesheet" href="css.css">
    
</head>
<body>
    <div id="flash-overlay" class="flash-overlay"></div>
<div id="confirm-modal" class="modal-overlay">
    <div class="modal-content">
        <div id="sticker-idoc" class="idoc-sticker">IDOC</div>
        <h3>Ви впевнені, що хочете покинути сайт?</h3>
        <p>Ви переходите на зовнішній ресурс</p>
        <div class="modal-buttons">
            <button id="modal-cancel">Ні, залишитись</button>
            <button id="modal-confirm">Так, перейти</button>
        </div>
    </div>
</div>
<div class="filter-panel" id="floating-panel">
    <div class="filter-row main-search">
        <input type="text" id="search-input" placeholder="Пошук за посадою...">
<!-- Кнопки керування -->
<button id="magic-compass" title="Не знаєш що обрати? Нехай вирішить IDOC">Магічний компас</button>
<button id="theme-toggle-btn" class="nav-btn theme-switch-btn" style="margin-left: 10px;">Змінити стиль</button>
<!-- НОВА КНОПКА -->
<button id="about-btn" class="nav-btn" style="margin-left: 10px;">Про нас</button>
    </div>
    <div class="filter-row selects-grid">
        <select id="company-filter"><option value="all">Усі компанії</option></select>
        <select id="location-filter"><option value="all">Усі локації</option></select>
        <select id="remote-filter">
            <option value="all">Дистанційка (Усі)</option>
            <option value="remote">Тільки дистанційно</option>
            <option value="office">Тільки офіс / гібрид</option>
        </select>
        <select id="employment-filter"><option value="all"> Тип зайнятості (Усі)</option></select>
        <select id="keyword-filter"><option value="all"> Усі ключові слова</option></select>
        <select id="sort-date">
            <option value="newest">Спочатку нові</option>
            <option value="oldest">Спочатку старі</option>
        </select>
    </div>
</div>
    <h1>Список вакансій</h1>
    <div id="jobs-container"></div>

    <script src="script.js"></script>
</body>
</html>
